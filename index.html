<!DOCTYPE html>
<html lang ="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>csv-analyzer</title>
    <style>
        /*futureadd*/
        #dropzone {
            border: 2px dashed #999;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <h1>csv-analyzer</h1>

    <div id="dropzone">
            <p>Drop a CSV file here, or</p>
            <label>
                browse for one
                <input type="file" id="fileinput" accept=".csv">
            </label>
    </div>

    <div id="summary"></div>
    <div id="preview"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        function handleFile(file) {
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function (results) {
                    console.log("parse errors:", results.errors);
                    renderSummary(results.data, results.meta.fields);
                    renderPreview(results.data, results.meta.fields);
                }
            });
        }

        function renderSummary(data, fields) {
            const summary = document.getElementById("summary");
            summary.textContent = `${data.length} rows x ${fields.length} columns`;
        }

        function renderPreview(data, fields) {
            let html = "<table><thead><tr>";
            for (const field of fields) {
                html += `<th>${field}</th>`;
            }
            html += "</tr></thead><tbody>";

            for (const row of data.slice(0, 20)){
                html += "<tr>";
                for (const field of fields){
                    html += `<td>${row[field]}</td>`;
                }
                html += "</tr>";
            }
            html += "</tbody></table>";
            document.getElementById("preview").innerHTML = html;
        }
        const fileInput = document.getElementById("fileinput");
        fileInput.addEventListener("change", function (event) {
            handleFile(event.target.files[0]);
        });

        const dropzone = document.getElementById("dropzone");
        dropzone.addEventListener("dragover", function (event) {
            event.preventDefault();
        });
        dropzone.addEventListener("drop", function (event){
            event.preventDefault();
            handleFile(event.dataTransfer.files[0]);
        });
    </script>
</body>
</html>
