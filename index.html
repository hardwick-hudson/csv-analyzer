<!DOCTYPE html>
<html lang ="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>csv-analyzer</title>
    <style>
        /*futureadd*/
        #dropzone {
            border: 2px dashed #999;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <h1>csv-analyzer</h1>

    <div id="dropzone">
            <p>Drop a CSV file here, or</p>
            <label>
                browse for one
                <input type="file" id="fileinput" accept=".csv">
            </label>
    </div>

    <div id="summary"></div>
    <div id="preview"></div>
    <div id="stats"></div>
    <div id="flags"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>

        function isNumericValue(trimmed) {
            if (trimmed === "") {
                return false;
            }
            return !Number.isNaN(Number(trimmed));
        }
        // linear-interpolated quantile; expects numbers sorted asc
        function quantile(sorted, q){
            const pos = (sorted.length -1) * q;
            const base = Math.floor(pos);
            const rest = pos - base;
            if (base + 1 < sorted.length){
                return sorted[base] + rest * (sorted[base + 1] - sorted[base]);
            }
            return sorted[base];
        }
        function round2(n) {
            return Math.round(n * 100) / 100;
        }

        function handleFile(file) {
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function (results) {
                    const data = results.data;
                    const fields = results.meta.fields;
                    const stats = analyzeColumns(data, fields);
                    const flags = findFlags(data, fields, stats, results.errors);

                    renderSummary(data, fields);
                    renderPreview(data, fields);
                    renderStats(stats);
                    renderFlags(flags);

                }
            });
        }

        function renderSummary(data, fields) {
            const summary = document.getElementById("summary");
            summary.textContent = `${data.length} rows x ${fields.length} columns`;
        }

        function renderPreview(data, fields) {
            let html = "<table><thead><tr>";
            for (const field of fields) {
                html += `<th>${field}</th>`;
            }
            html += "</tr></thead><tbody>";

            for (const row of data.slice(0, 20)){
                html += "<tr>";
                for (const field of fields){
                    html += `<td>${row[field]}</td>`;
                }
                html += "</tr>";
            }
            html += "</tbody></table>";
            document.getElementById("preview").innerHTML = html;
        }

        function analyzeColumns(data, fields){
            const stats = [];

            for (const field of fields){
                let blanks = 0;
                const numbers = [];
                const distinctValues = new Set();

                for (const row of data) {
                    const raw = row[field];

                    let trimmed;
                    if (raw === undefined) {
                        trimmed = "";
                    } else {
                        trimmed = raw.trim();
                    }

                    if (trimmed === ""){
                        blanks++;
                        continue;
                    }

                    distinctValues.add(trimmed);

                    if (isNumericValue(trimmed)) {
                        numbers.push(Number(trimmed));
                    }
                }
                const nonBlank = data.length - blanks;

                let type = "text";
                if (nonBlank === 0) {
                    type = "empty";
                } else if (numbers.length / nonBlank >= 0.8){
                    // threshold is deliberately below 100% so a stray bad value
                    // flags as an anomaly instead of flipping the column to text
                    type = "numeric";
                }
                const columnStats = {
                    name: field,
                    type: type,
                    total: data.length,
                    blanks: blanks,
                    numeric: numbers.length,
                    distinct: distinctValues.size
                };

                if (type === "numeric" && numbers.length > 0){
                    let sum = 0;
                    let min = numbers[0];
                    let max = numbers[0];
                    for (const n of numbers) {
                        sum += n;
                        if (n < min) { min = n; }
                        if (n > max) { max = n; }
                    }
                    columnStats.min = min;
                    columnStats.max = max;
                    columnStats.mean = sum / numbers.length;
                    columnStats.sortedNumbers = numbers.slice().sort(function(a, b) {return a - b; });
                }
                stats.push(columnStats);
            }
            return stats;
        }

        function findFlags(data, fields, stats, parseErrors){
            const flags = [];

            for (const err of parseErrors){
                flags.push(`Parser: ${err.message} (row ${err.row + 1})`);
            }

            for (const col of stats) {
                if (col.type === "numeric") {
                    for (let i = 0; i <data.length; i++) {
                        const raw = data[i][col.name];
                        let trimmed = "";
                        if (raw !== undefined) {
                            trimmed = raw.trim();
                        }
                        if (trimmed !== "" && !isNumericValue(trimmed)) {
                            flags.push(`Column "${col.name}": non-numeric value "${trimmed}" in row ${i+1}`);
                        }
                    }
                }
                // IQR needs enough data to mean anything; below 8 values
                // it stays silent rather than producing confident nonsense
                if (col.type === "numeric" && col.sortedNumbers.length >= 8) {
                    const q1 = quantile(col.sortedNumbers, 0.25);
                    const q3 = quantile(col.sortedNumbers, 0.75);
                    const iqr = q3 - q1;
                    const low = q1 - 1.5 * iqr;
                    const high = q3 +1.5 * iqr;
                    for (const n of col.sortedNumbers) {
                        if (n < low || n > high) {
                            flags.push(`Column "${col.name}": ${n} is a statistical outlier (expected range ${round2(low)} to ${round2(high)})`);
                        }
                    }
                }

                if (col.total > 0 && col.blanks / col.total > 0.5) {
                    const pct = Math.round((col.blanks / col.total) * 100);
                    flags.push(`Column "${col.name}" is ${pct}% blank`);
                }

                if (col.distinct === 1 && col.blanks < col.total) {
                    flags.push(`Column "${col.name}" has only one value in every row`);
                }
            }
            // rows are joined on \u0001 instead of comma
            // because cell data can contain commas
            const seen = new Set();
            for (let i = 0; i < data.length; i++) {
                const parts = [];
                for (const field of fields) {
                    const raw = data[i][field];
                    if (raw === undefined) {
                        parts.push("");
                    } else {
                        parts.push(raw);
                    }
                }
                const key = parts.join("\u0001");
                if (seen.has(key)) {
                    flags.push(`Row ${i+1} is an exact duplicate of an earlier row`);
                } else {
                    seen.add(key);
                }
            }
            return flags;
        }

        function renderFlags(flags) {
            let html = "";
            if (flags.length === 0){
                html = '<p class="muted">No issues detected.</p>';
            } else {
                html = "<ul>";
                for (const flag of flags) {
                    html += `<li>${flag}</li>`;
                }
                html += "</ul>";
            }
            document.getElementById("flags").innerHTML = html;
        }

        function renderStats(stats) {
            let html = "<table><thead><tr>";
            html += "<th>column</th><th>type</th><th>blanks</th><th>distinct</th><th>min</th><th>max</th><th>mean</th>";
            html += "</tr></thead><tbody>";

            for (const col of stats) {
                html += "<tr>";
                html += `<td>${col.name}</td>`;
                html += `<td>${col.type}</td>`;
                html += `<td>${col.blanks}</td>`;
                html += `<td>${col.distinct}</td>`;
                if (col.type === "numeric") {
                    html += `<td>${col.min}</td><td>${col.max}</td><td>${col.mean}</td>`;
                } else {
                    html += "<td>-</td><td>-</td><td>-</td>";
                }
                html += "</tr>";
            }
            html += "</tbody></table>";
            document.getElementById("stats").innerHTML = html;
        }

        const fileInput = document.getElementById("fileinput");
        fileInput.addEventListener("change", function (event) {
            handleFile(event.target.files[0]);
        });

        const dropzone = document.getElementById("dropzone");
        dropzone.addEventListener("dragover", function (event) {
            event.preventDefault();
        });
        dropzone.addEventListener("drop", function (event){
            event.preventDefault();
            handleFile(event.dataTransfer.files[0]);
        });
    </script>
</body>
</html>
