<!DOCTYPE html>
<html lang ="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>csv-analyzer</title>
    <style>
        /*futureadd*/
        #dropzone {
            border: 2px dashed #999;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <h1>csv-analyzer</h1>

    <div id="dropzone">
            <p>Drop a CSV file here, or</p>
            <label>
                browse for one
                <input type="file" id="fileinput" accept=".csv">
            </label>
    </div>

    <div id="summary"></div>
    <div id="preview"></div>
    <div id="stats"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        function handleFile(file) {
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function (results) {
                    console.log("parse errors:", results.errors);
                    renderSummary(results.data, results.meta.fields);
                    renderPreview(results.data, results.meta.fields);
                    const stats = analyzeColumns(results.data, results.meta.fields);
                    renderStats(stats);
                }
            });
        }

        function renderSummary(data, fields) {
            const summary = document.getElementById("summary");
            summary.textContent = `${data.length} rows x ${fields.length} columns`;
        }

        function renderPreview(data, fields) {
            let html = "<table><thead><tr>";
            for (const field of fields) {
                html += `<th>${field}</th>`;
            }
            html += "</tr></thead><tbody>";

            for (const row of data.slice(0, 20)){
                html += "<tr>";
                for (const field of fields){
                    html += `<td>${row[field]}</td>`;
                }
                html += "</tr>";
            }
            html += "</tbody></table>";
            document.getElementById("preview").innerHTML = html;
        }

        function analyzeColumns(data, fields){
            const stats = [];

            for (const field of fields){
                let blanks = 0;
                const numbers = [];
                const distinctValues = new Set();

                for (const row of data) {
                    const raw = row[field];

                    let trimmed;
                    if (raw === undefined) {
                        trimmed = "";
                    } else {
                        trimmed = raw.trim();
                    }

                    if (trimmed === ""){
                        blanks++;
                        continue;
                    }

                    distinctValues.add(trimmed);

                    const num = Number(trimmed);
                    if (!Number.isNaN(num)){
                        numbers.push(num);
                    }
                }
                const nonBlank = data.length - blanks;

                let type = "text";
                if (nonBlank === 0) {
                    type = "empty";
                } else if (numbers.length / nonBlank >= 0.8){
                    type = "numeric";
                }
                const columnStats = {
                    name: field,
                    type: type,
                    total: data.length,
                    blanks: blanks,
                    numeric: numbers.length,
                    distinct: distinctValues.size
                };

                if (type === "numeric" && numbers.length > 0){
                    let sum = 0;
                    let min = numbers[0];
                    let max = numbers[0];
                    for (const n of numbers) {
                        sum += n;
                        if (n < min) { min = n; }
                        if (n > max) { max = n; }
                    }
                    columnStats.min = min;
                    columnStats.max = max;
                    columnStats.mean = sum / numbers.length;
                }
                stats.push(columnStats);
            }
            return stats;
        }

        function renderStats(stats) {
            let html = "<table><thead><tr>";
            html += "<th>column</th><th>type</th><th>blanks</th><th>distinct</th><th>min</th><th>max</th><th>mean</th>";
            html += "</tr></thead><tbody>";

            for (const col of stats) {
                html += "<tr>";
                html += `<td>${col.name}</td>`;
                html += `<td>${col.type}</td>`;
                html += `<td>${col.blanks}</td>`;
                html += `<td>${col.distinct}</td>`;
                if (col.type === "numeric") {
                    html += `<td>${col.min}</td><td>${col.max}</td><td>${col.mean}</td>`;
                } else {
                    html += "<td>-</td><td>-</td><td>-</td>";
                }
                html += "</tr>";
            }
            html += "</tbody></table>";
            document.getElementById("stats").innerHTML = html;
        }

        const fileInput = document.getElementById("fileinput");
        fileInput.addEventListener("change", function (event) {
            handleFile(event.target.files[0]);
        });

        const dropzone = document.getElementById("dropzone");
        dropzone.addEventListener("dragover", function (event) {
            event.preventDefault();
        });
        dropzone.addEventListener("drop", function (event){
            event.preventDefault();
            handleFile(event.dataTransfer.files[0]);
        });
    </script>
</body>
</html>
